<body>

<div class="app-shell" id="app-shell">

  <!-- Notification -->
  <div class="notification" id="notification">
    <span id="notification-msg">Welcome to Sho P!</span>
    <button class="notification-close" onclick="hideNotification()">&times;</button>
  </div>

  <header>
    <div class="brand-row">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 8.5V7a3.5 3.5 0 0 1 7 0v1.5"/><path d="M5.8 8.5h12.4l-1 12a1 1 0 0 1-1 .9H7.8a1 1 0 0 1-1-.9z"/></svg>
      </span>
      <div class="brand-block">
        <p class="brand-name">Sho<span class="accent">P</span></p>
        <p class="brand-tag" id="brand-tag">Ethiopia's Marketplace</p>
      </div>
    </div>
    <div class="search-row" id="search-row">
      <input type="text" id="search-input" class="search-input" placeholder="Search products, brands and categories" oninput="renderHome(this.value)" aria-label="Search products">
      <button class="filter-btn" onclick="openFilterModal()" aria-label="Filter products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M8 12h8M11 17h2"/></svg>
      </button>
      <button class="search-btn" id="search-btn" onclick="doSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M19.3 19.3 15.2 15.2"/></svg>
      </button>
    </div>
  </header>

  <main>
    <section id="home" class="page active">
      <div class="section-row"><h2 class="section-title" id="home-title">All products</h2><span class="count-chip" id="home-count">0</span></div>
      <div class="grid" id="home-grid"></div>
      <div id="home-empty"></div>
    </section>

    <section id="detail" class="page">
      <button class="detail-back" id="detail-back" onclick="goBackFromDetail()">← Back</button>
      <div id="detail-content"></div>
    </section>

    <section id="cart" class="page">
      <div class="section-row"><h2 class="section-title" id="cart-title">Your bag</h2></div>
      <div id="cart-content"></div>
    </section>

    <section id="upload" class="page">
      <div id="upload-content"></div>
    </section>

    <section id="store" class="page">
      <div id="store-content"></div>
    </section>
  </main>

  <footer>
    <button class="nav-btn active" data-page="home" onclick="showPage('home')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 11.5 12 4l8.5 7.5"/><path d="M5.5 10v9.5h13V10"/><path d="M9.5 19.5v-5.5h5v5.5"/></svg></span>
      <span id="nav-home">Home</span>
    </button>
    <button class="nav-btn" data-page="cart" onclick="showPage('cart')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 8.5V7a3.5 3.5 0 0 1 7 0v1.5"/><path d="M5.8 8.5h12.4l-1 12a1 1 0 0 1-1 .9H7.8a1 1 0 0 1-1-.9z"/></svg>
        <span class="nav-badge" id="cart-badge">0</span>
      </span>
      <span id="nav-cart">Cart</span>
    </button>
    <button class="nav-btn" data-page="upload" onclick="showPage('upload')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5v13M5.5 12h13"/></svg></span>
      <span id="nav-upload">Upload</span>
    </button>
    <button class="nav-btn" data-page="store" onclick="showPage('store')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5 5.5 4.5h13L20 9.5"/><path d="M4.5 9.5v10h15v-10"/><path d="M9.5 19.5v-5a2.5 2.5 0 0 1 5 0v5"/></svg></span>
      <span id="nav-store">Store</span>
    </button>
  </footer>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <div class="toast" id="toast"></div>

</div>

<script>
// =====================================================
// API URL - YOUR LIVE BACKEND
// =====================================================
const API_URL = 'https://shop-backend-x00h.onrender.com/api';

// =====================================================
// TRANSLATIONS (keep your full translation object here)
// =====================================================
const TRANSLATIONS = {
  // ... keep ALL your translations from your original file ...
};

// =====================================================
// FIXED: CREATE SHOP FUNCTION
// =====================================================
async function createShop() {
  // Get values from the form
  const fullName = document.getElementById('a-name')?.value?.trim() || '';
  const shopName = document.getElementById('a-shop')?.value?.trim() || '';
  const phone = document.getElementById('a-phone')?.value?.trim() || '';
  const password = document.getElementById('a-password')?.value?.trim() || '';

  // Validate
  if (!fullName || !shopName || !phone || !password) {
    showToast('⚠️ Please fill in all fields!');
    return;
  }

  // Show loading
  const btn = document.querySelector('#modal-box .btn-fill');
  if (btn) {
    btn.textContent = '⏳ Creating...';
    btn.disabled = true;
  }

  try {
    const response = await fetch(`${API_URL}/create-shop`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        fullName, 
        shopName, 
        phone, 
        password 
      })
    });

    const data = await response.json();
    console.log('📦 Server response:', data);

    if (data.success) {
      // Save token and user info
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      isLogged = true;
      seller = data.user;
      
      closeModal();
      showToast('✅ Shop created successfully! 🎉');
      showPage('store');
      await loadSellerProducts();
      renderStore();
    } else {
      showToast('❌ Error: ' + (data.error || 'Something went wrong'));
    }
  } catch (error) {
    console.error('❌ Create shop error:', error);
    showToast('❌ Cannot connect to backend. Is it running?');
  }

  // Reset button
  if (btn) {
    btn.textContent = 'Create shop & start selling';
    btn.disabled = false;
  }
}

// =====================================================
// FIXED: LOGIN FUNCTION
// =====================================================
async function login() {
  const shopName = document.getElementById('a-shop')?.value?.trim() || '';
  const password = document.getElementById('a-password')?.value?.trim() || '';

  if (!shopName || !password) {
    showToast('⚠️ Please enter shop name and password');
    return;
  }

  try {
    const response = await fetch(`${API_URL}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ shopName, password })
    });

    const data = await response.json();

    if (data.success) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      isLogged = true;
      seller = data.user;
      closeModal();
      showToast('✅ Welcome back! 🎉');
      showPage('store');
      await loadSellerProducts();
      renderStore();
    } else {
      showToast('❌ ' + (data.error || 'Login failed'));
    }
  } catch (error) {
    showToast('❌ Cannot connect to backend');
  }
}

// =====================================================
// FIXED: RENDER AUTH MODAL (connects buttons to functions)
// =====================================================
function renderAuthModal() {
  const isSignup = authMode === 'signup';
  const box = document.getElementById('modal-box');
  
  box.innerHTML = `
    <div class="sheet-handle"></div>
    <h2 class="modal-title">${isSignup ? 'Create your shop' : 'Log in to your shop'}</h2>
    <p class="modal-sub">${isSignup ? 'Set up your seller profile to start listing products.' : 'Welcome back — sign in to manage your shop.'}</p>
    
    <div class="field">
      <label>Full name</label>
      <input type="text" id="a-name" placeholder="e.g. Lulit Bekele" required>
    </div>
    
    <div class="field">
      <label>Shop name</label>
      <input type="text" id="a-shop" placeholder="e.g. Lulit Electronics" required>
    </div>
    
    ${isSignup ? `
      <div class="field">
        <label>Phone number</label>
        <input type="tel" id="a-phone" placeholder="+251 9XX XXX XXX">
      </div>
    ` : ''}
    
    <div class="field">
      <label>Password</label>
      <input type="password" id="a-password" placeholder="••••••••" required>
    </div>
    
    <button class="btn btn-fill btn-block" onclick="${isSignup ? 'createShop()' : 'login()'}">
      ${isSignup ? 'Create shop & start selling' : 'Log in'}
    </button>
    
    <p class="modal-switch">
      ${isSignup ? 'Already have a shop?' : 'New to Sho P?'} 
      <a onclick="switchAuthMode()">${isSignup ? 'Log in' : 'Create one'}</a>
    </p>
  `;
}
