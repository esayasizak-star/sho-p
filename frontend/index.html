<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3A30">
<title>Sho P — Ethiopia's Marketplace</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --pine:#1F3A30;
    --saffron:#D98E3F;
    --saffron-dark:#C17A2E;
    --bg:#F4F7F4;
    --surface:#FFFFFF;
    --ink:#1C2420;
    --muted:#6B7770;
    --line:#E3E8E2;
    --danger:#C1503F;
    --danger-dark:#A8402F;
    --font-display:'Fraunces',Georgia,serif;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:#ECEFE9;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button,input,select,textarea{font-family:inherit;color:inherit;}
  img{display:block;max-width:100%;}
  h1,h2,h3,p{margin:0;}
  a{cursor:pointer;}

  .icon{width:20px;height:20px;flex-shrink:0;display:block;}

  /* ---------- App shell ---------- */
  .app-shell{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    box-shadow:0 0 0 1px var(--line), 0 18px 60px rgba(20,26,22,.06);
  }

  /* ---------- Header ---------- */
  header{
    position:sticky;
    top:0;
    z-index:100;
    background:var(--pine);
    color:#fff;
    padding-bottom:14px;
  }
  .brand-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:18px 18px 10px;
  }
  .brand-mark{
    width:36px;height:36px;
    border-radius:50%;
    background:rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand-mark svg{width:18px;height:18px;color:#fff;}
  .brand-name{
    font-family:var(--font-display);
    font-style:italic;
    font-weight:600;
    font-size:23px;
    letter-spacing:-.01em;
    color:#fff;
    line-height:1.1;
  }
  .brand-name .accent{color:var(--saffron);font-style:normal;}
  .brand-tag{
    font:600 10px var(--font-body);
    text-transform:uppercase;
    letter-spacing:.08em;
    color:rgba(255,255,255,.62);
    margin-top:2px;
  }

  .search-row{
    display:flex;
    gap:8px;
    padding:0 16px;
    align-items:center;
  }
  .search-row.hidden{
    display:none;
  }
  .search-input{
    flex:1;
    background:#fff;
    border:none;
    border-radius:999px;
    padding:11px 16px;
    font:14px var(--font-body);
    color:var(--ink);
    outline:none;
  }
  .search-input::placeholder{color:var(--muted);}
  .search-btn{
    width:44px;height:44px;
    flex-shrink:0;
    border:none;
    border-radius:999px;
    background:var(--saffron);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .search-btn:hover{background:var(--saffron-dark);}
  .search-btn svg{width:18px;height:18px;}

  .filter-btn{
    width:44px;height:44px;
    flex-shrink:0;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,.15);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background .15s;
  }
  .filter-btn:hover{background:rgba(255,255,255,.25);}
  .filter-btn svg{width:18px;height:18px;}

  /* ---------- Pages ---------- */
  main{padding:18px 16px 100px;}
  .page{display:none;}
  .page.active{display:block;animation:fadeIn .18s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  .section-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin:4px 0 14px;
  }
  .section-title{
    font:600 16px var(--font-display);
    color:var(--ink);
  }
  .count-chip{
    background:var(--line);
    color:var(--muted);
    font:600 11px var(--font-body);
    padding:3px 9px;
    border-radius:999px;
  }

  /* ---------- Product grid + cards ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .product-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    cursor:pointer;
    transition:transform .12s, box-shadow .12s;
  }
  .product-card:active{transform:scale(.97);}
  .product-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06);}
  .card-swatch{
    position:relative;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#2F4F46;
    overflow:hidden;
  }
  .card-swatch svg{width:32%;height:32%;color:#fff;opacity:.9;}
  .card-swatch img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    background:#f0f0f0;
  }
  .cat-chip{
    position:absolute;
    top:8px;left:8px;
    background:rgba(255,255,255,.2);
    color:#fff;
    font:600 9.5px var(--font-body);
    text-transform:uppercase;
    letter-spacing:.04em;
    padding:3px 7px;
    border-radius:999px;
    z-index:2;
  }
  .sold-overlay{
    position:absolute;inset:0;
    background:rgba(20,26,22,.58);
    display:flex;align-items:center;justify-content:center;
    z-index:3;
  }
  .sold-overlay span{
    color:#fff;
    font:700 11px var(--font-body);
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  .card-body{
    padding:10px 11px 12px;
    display:flex;
    flex-direction:column;
    gap:7px;
    flex:1;
  }
  .card-name{
    font:600 13px/1.3 var(--font-body);
    color:var(--ink);
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    min-height:34px;
  }
  .stock-caption{font:11.5px var(--font-body);color:var(--muted);}
  .card-footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:auto;
    gap:8px;
  }
  .price-tag{
    display:inline-flex;
    align-items:center;
    position:relative;
    background:var(--pine);
    color:#fff;
    font:600 12.5px var(--font-body);
    font-variant-numeric:tabular-nums;
    padding:5px 9px 5px 14px;
    border-radius:2px 7px 7px 2px;
    white-space:nowrap;
  }
  .price-tag::before{
    content:'';
    position:absolute;
    left:4px;top:50%;
    width:5px;height:5px;
    border-radius:50%;
    background:#fff;
    opacity:.88;
    transform:translateY(-50%);
  }
  .add-fab{
    width:30px;height:30px;
    flex-shrink:0;
    border:none;
    border-radius:50%;
    background:var(--saffron);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .add-fab:hover{background:var(--saffron-dark);}
  .add-fab svg{width:16px;height:16px;}

  .seller-actions{
    display:flex;
    gap:6px;
    margin-top:2px;
  }

  /* ---------- Buttons ---------- */
  .btn{
    font:600 13.5px var(--font-body);
    padding:11px 14px;
    border-radius:10px;
    border:1px solid transparent;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:transform .12s,background .15s,opacity .15s;
    white-space:nowrap;
  }
  .btn svg{width:15px;height:15px;}
  .btn:active{transform:scale(.97);}
  .btn-fill{background:var(--saffron);color:var(--ink);}
  .btn-fill:hover{background:var(--saffron-dark);}
  .btn-fill-pine{background:var(--pine);color:#fff;}
  .btn-fill-pine:hover{background:#162e25;}
  .btn-outline{background:transparent;border-color:var(--pine);color:var(--pine);}
  .btn-outline:hover{background:rgba(31,58,48,.06);}
  .btn-outline-danger{background:transparent;border-color:var(--danger);color:var(--danger);}
  .btn-outline-danger:hover{background:rgba(193,80,63,.07);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 10px;font-size:12px;border-radius:8px;}
  .icon-btn{
    background:none;border:none;color:var(--muted);
    padding:6px;border-radius:8px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{color:var(--danger);background:rgba(193,80,63,.08);}
  .icon-btn svg{width:17px;height:17px;}

  .field-error input,.field-error select,.field-error textarea{border-color:var(--danger) !important;}

  /* ---------- Forms ---------- */
  .form-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font:600 11px var(--font-body);
    text-transform:uppercase;
    letter-spacing:.03em;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input,.field select,.field textarea{
    width:100%;
    padding:11px 13px;
    border:1px solid var(--line);
    border-radius:10px;
    font:14px var(--font-body);
    color:var(--ink);
    background:#fff;
    outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pine);}
  .field textarea{resize:vertical;min-height:74px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}

  .photo-picker{
    width:100%;
    aspect-ratio:1/1;
    max-height:160px;
    border:1.6px dashed var(--line);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    color:var(--muted);
    cursor:pointer;
    background:#fafbfa;
    overflow:hidden;
    position:relative;
    margin-bottom:14px;
  }
  .photo-picker img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-picker .ph-icon svg{width:24px;height:24px;}
  .photo-picker .ph-hint{font:12px var(--font-body);font-weight:500;}
  .avatar-picker{
    width:92px;height:92px;
    max-height:none;
    border-radius:50%;
    margin:0 auto 16px;
  }

  /* ---------- Empty / gate states ---------- */
  .empty-state{
    text-align:center;
    padding:54px 22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .empty-icon{
    width:58px;height:58px;
    border-radius:50%;
    background:var(--line);
    color:var(--muted);
    display:flex;align-items:center;justify-content:center;
  }
  .empty-icon svg{width:25px;height:25px;}
  .empty-title{font:600 16px var(--font-display);color:var(--ink);}
  .empty-copy{font:13px/1.5 var(--font-body);color:var(--muted);max-width:240px;}

  .gate-card{
    margin-top:30px;
    padding:34px 22px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:18px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .gate-icon{
    width:60px;height:60px;
    border-radius:50%;
    background:rgba(31,58,48,.08);
    color:var(--pine);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:4px;
  }
  .gate-icon svg{width:26px;height:26px;}
  .gate-title{font:600 19px var(--font-display);color:var(--ink);}
  .gate-copy{font:13.5px/1.5 var(--font-body);color:var(--muted);max-width:280px;}
  .gate-actions{display:flex;gap:10px;width:100%;margin-top:14px;}

  /* ---------- Cart ---------- */
  .cart-item{
    display:flex;
    gap:12px;
    padding:12px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:10px;
    align-items:center;
  }
  .cart-item .swatch{
    width:52px;height:52px;
    flex-shrink:0;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    background:#2F4F46;
  }
  .cart-item .swatch img{width:100%;height:100%;object-fit:cover;}
  .cart-item .swatch svg{width:22px;height:22px;color:#fff;}
  .cart-item-body{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
  .cart-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
  .cart-item-top .card-name{min-height:0;}
  .cart-item-bottom{display:flex;justify-content:space-between;align-items:center;}
  .qty-stepper{
    display:inline-flex;
    align-items:center;
    border:1px solid var(--line);
    border-radius:999px;
    overflow:hidden;
  }
  .qty-stepper button{
    width:26px;height:26px;
    border:none;background:#fff;color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .qty-stepper button:hover{background:var(--bg);}
  .qty-stepper button svg{width:13px;height:13px;}
  .qty-stepper span{min-width:24px;text-align:center;font:600 12.5px var(--font-body);font-variant-numeric:tabular-nums;}

  .cart-summary{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:4px;
  }
  .summary-row{display:flex;justify-content:space-between;align-items:center;}
  .summary-row span:first-child{font:13px var(--font-body);color:var(--muted);}
  .summary-amount{font:700 18px var(--font-body);color:var(--ink);font-variant-numeric:tabular-nums;}

  /* ---------- Store dashboard ---------- */
  .dash-card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
  }
  .dash-actions{
    position:absolute;
    top:16px;right:16px;
    display:flex;
    gap:8px;
  }
  .dash-actions button{
    background:none;
    border:none;
    color:var(--muted);
    font:600 11.5px var(--font-body);
    cursor:pointer;
    padding:4px 8px;
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:4px;
    transition:background .15s;
  }
  .dash-actions button:hover{background:rgba(0,0,0,.05);}
  .dash-actions .logout-btn:hover{color:var(--danger);}
  .dash-actions .settings-btn:hover{color:var(--pine);}
  .dash-actions svg{width:14px;height:14px;}
  .dash-profile{display:flex;gap:12px;align-items:center;padding-right:120px;}
  .avatar{
    width:56px;height:56px;
    border-radius:50%;
    background:var(--pine);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font:600 17px var(--font-display);
    overflow:hidden;
    flex-shrink:0;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .dash-name{font:600 17px var(--font-display);color:var(--ink);margin-bottom:3px;}
  .dash-shop{font:13px var(--font-body);font-weight:500;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .dash-shop svg{width:13px;height:13px;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;}
  .stat-tile{
    background:var(--bg);
    border-radius:12px;
    padding:12px 5px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .stat-tile svg{width:17px;height:17px;color:var(--pine);}
  .stat-num{font:700 14px var(--font-body);color:var(--ink);font-variant-numeric:tabular-nums;}
  .stat-label{font:600 9.5px var(--font-body);color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}

  .dash-payment-row {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .dash-payment-label {
    font:500 13px var(--font-body);
    color:var(--muted);
  }
  .dash-payment-balance {
    font:600 15px var(--font-body);
    color:var(--pine);
  }
  .dash-payment-plus {
    width:36px;
    height:36px;
    border:none;
    border-radius:50%;
    background:var(--pine);
    color:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:20px;
    font-weight:700;
    line-height:1;
    transition:transform .12s,background .15s;
  }
  .dash-payment-plus:hover{background:#162e25;transform:scale(1.05);}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(20,26,22,.5);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:300;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    width:100%;
    max-width:480px;
    background:var(--surface);
    border-radius:18px 18px 0 0;
    padding:20px 20px 28px;
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp .2s ease;
  }
  @keyframes slideUp{from{transform:translateY(16px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:999px;margin:0 auto 16px;}
  .modal-title{font:600 19px var(--font-display);color:var(--ink);margin-bottom:4px;}
  .modal-sub{font:13px/1.4 var(--font-body);color:var(--muted);margin-bottom:16px;}
  .modal-actions{display:flex;gap:10px;margin-top:4px;}
  .modal-switch{margin-top:14px;text-align:center;font:13px var(--font-body);color:var(--muted);}
  .modal-switch a{color:var(--pine);font-weight:600;}

  /* Payment methods in modal */
  .payment-method-item {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .payment-method-item:last-child{border-bottom:0;}
  .pm-name {
    font:500 14px var(--font-body);
    color:var(--ink);
  }
  .pm-detail {
    font:13px var(--font-body);
    color:var(--muted);
  }
  .pm-remove {
    background:none;
    border:none;
    color:var(--danger);
    cursor:pointer;
    font-size:13px;
    font-weight:600;
  }
  .pm-remove:hover{text-decoration:underline;}

  /* ---------- Language selector in settings ---------- */
  .lang-option {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    transition:background .15s;
    border-radius:8px;
  }
  .lang-option:hover{background:var(--bg);}
  .lang-option .lang-name{font:500 14px var(--font-body);color:var(--ink);}
  .lang-option .lang-native{font:13px var(--font-body);color:var(--muted);}
  .lang-option .lang-check{color:var(--pine);display:none;}
  .lang-option.active .lang-check{display:block;}
  .lang-option.active{background:rgba(31,58,48,.06);}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;
    left:50%;
    bottom:88px;
    transform:translate(-50%,10px);
    background:var(--pine);
    color:#fff;
    padding:11px 18px;
    border-radius:999px;
    font:13px var(--font-body);
    font-weight:500;
    box-shadow:0 10px 28px rgba(0,0,0,.18);
    opacity:0;
    pointer-events:none;
    transition:opacity .22s,transform .22s;
    z-index:400;
    max-width:84%;
    text-align:center;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}

  /* ---------- Footer nav ---------- */
  footer{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:480px;
    background:var(--surface);
    border-top:1px solid var(--line);
    display:flex;
    justify-content:space-around;
    padding:8px 4px 12px;
    z-index:200;
  }
  .nav-btn{
    background:none;
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    color:var(--muted);
    font:600 10.5px var(--font-body);
    padding:6px 16px;
    border-radius:12px;
    cursor:pointer;
  }
  .nav-btn.active{color:var(--pine);background:rgba(31,58,48,.08);}
  .nav-icon{position:relative;display:inline-flex;}
  .nav-icon svg{width:21px;height:21px;}
  .nav-badge{
    position:absolute;
    top:-4px;right:-8px;
    background:var(--saffron);
    color:var(--ink);
    font:800 9.5px var(--font-body);
    min-width:16px;height:16px;
    border-radius:999px;
    display:none;
    align-items:center;justify-content:center;
    padding:0 3px;
  }

  /* ---------- Product detail page ---------- */
  .detail-back{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:none;
    border:none;
    color:var(--muted);
    font:500 13px var(--font-body);
    cursor:pointer;
    padding:0 0 12px 0;
  }
  .detail-back:hover{color:var(--ink);}
  .detail-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
  }
  .detail-swatch{
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:#2F4F46;
    overflow:hidden;
  }
  .detail-swatch img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .detail-swatch svg{width:30%;height:30%;color:#fff;opacity:.9;}
  .detail-body{padding:18px;}
  .detail-name{font:600 20px var(--font-display);color:var(--ink);margin-bottom:6px;}
  .detail-category{font:13px var(--font-body);color:var(--muted);margin-bottom:8px;}
  .detail-price{font:700 22px var(--font-body);color:var(--pine);margin-bottom:12px;}
  .detail-desc{font:14px/1.6 var(--font-body);color:var(--muted);margin-bottom:16px;}
  .detail-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .detail-actions .btn{flex:1;min-width:120px;}
  .follow-btn{
    background:none;
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 14px;
    font:600 12px var(--font-body);
    color:var(--muted);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:4px;
    transition:all .15s;
  }
  .follow-btn.following{
    background:var(--pine);
    color:#fff;
    border-color:var(--pine);
  }
  .follow-btn:hover{opacity:.8;}

  /* ---------- Filter modal ---------- */
  .filter-option{
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .filter-option:last-child{border-bottom:0;}
  .filter-label{
    font:600 12px var(--font-body);
    text-transform:uppercase;
    letter-spacing:.03em;
    color:var(--muted);
    display:block;
    margin-bottom:8px;
  }
  .filter-tags{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .filter-tag{
    padding:6px 14px;
    border:1px solid var(--line);
    border-radius:999px;
    background:#fff;
    font:500 12px var(--font-body);
    color:var(--ink);
    cursor:pointer;
    transition:all .12s;
  }
  .filter-tag:hover{background:var(--bg);}
  .filter-tag.active{
    background:var(--pine);
    color:#fff;
    border-color:var(--pine);
  }
  .filter-range{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .filter-range input{
    flex:1;
    padding:8px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font:13px var(--font-body);
    width:100%;
    outline:none;
  }
  .filter-range input:focus{border-color:var(--pine);}
  .filter-range span{color:var(--muted);font-size:13px;}

  /* ---------- Notification ---------- */
  .notification{
    position:fixed;
    top:0;
    left:50%;
    transform:translateX(-50%) translateY(-100%);
    width:100%;
    max-width:480px;
    background:var(--pine);
    color:#fff;
    padding:14px 18px;
    font:14px var(--font-body);
    font-weight:500;
    z-index:500;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    transition:transform .35s cubic-bezier(.22,.68,0,1);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .notification.show{transform:translateX(-50%) translateY(0);}
  .notification-close{
    background:none;
    border:none;
    color:rgba(255,255,255,.7);
    font-size:20px;
    cursor:pointer;
    padding:0 4px;
  }
  .notification-close:hover{color:#fff;}

  /* ---------- Accessibility ---------- */
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,a:focus-visible{
    outline:2px solid var(--pine);
    outline-offset:2px;
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important;}
  }
</style>
</head>

<div class="app-shell" id="app-shell">

  <!-- Notification -->
  <div class="notification" id="notification">
    <span id="notification-msg">Welcome to Sho P!</span>
    <button class="notification-close" onclick="hideNotification()">&times;</button>
  </div>

  <header>
    <div class="brand-row">

        <p class="brand-tag" id="brand-tag">Ethiopia's Marketplace</p>
      </div>
    </div>
    <div class="search-row" id="search-row">
      <input type="text" id="search-input" class="search-input" placeholder="Search products, brands and categories" oninput="renderHome(this.value)" aria-label="Search products">
      <button class="filter-btn" onclick="openFilterModal()" aria-label="Filter products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M8 12h8M11 17h2"/></svg>
      </button>
      <button class="search-btn" id="search-btn" onclick="doSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M19.3 19.3 15.2 15.2"/></svg>
      </button>
    </div>
  </header>

  <main>
    <section id="home" class="page active">
      <div class="section-row"><h2 class="section-title" id="home-title">All products</h2><span class="count-chip" id="home-count">0</span></div>
      <div class="grid" id="home-grid"></div>
      <div id="home-empty"></div>
    </section>

    <section id="detail" class="page">
      <button class="detail-back" id="detail-back" onclick="goBackFromDetail()">← Back</button>
      <div id="detail-content"></div>
    </section>

    <section id="cart" class="page">
      <div class="section-row"><h2 class="section-title" id="cart-title">Your bag</h2></div>
      <div id="cart-content"></div>
    </section>

    <section id="upload" class="page">
      <div id="upload-content"></div>
    </section>

    <section id="store" class="page">
      <div id="store-content"></div>
    </section>
  </main>

  <footer>
    <button class="nav-btn active" data-page="home" onclick="showPage('home')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 11.5 12 4l8.5 7.5"/><path d="M5.5 10v9.5h13V10"/><path d="M9.5 19.5v-5.5h5v5.5"/></svg></span>
      <span id="nav-home">Home</span>
    </button>
    <button class="nav-btn" data-page="cart" onclick="showPage('cart')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 8.5V7a3.5 3.5 0 0 1 7 0v1.5"/><path d="M5.8 8.5h12.4l-1 12a1 1 0 0 1-1 .9H7.8a1 1 0 0 1-1-.9z"/></svg>
        <span class="nav-badge" id="cart-badge">0</span>
      </span>
      <span id="nav-cart">Cart</span>
    </button>
    <button class="nav-btn" data-page="upload" onclick="showPage('upload')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5v13M5.5 12h13"/></svg></span>
      <span id="nav-upload">Upload</span>
    </button>
    <button class="nav-btn" data-page="store" onclick="showPage('store')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5 5.5 4.5h13L20 9.5"/><path d="M4.5 9.5v10h15v-10"/><path d="M9.5 19.5v-5a2.5 2.5 0 0 1 5 0v5"/></svg></span>
      <span id="nav-store">Store</span>
    </button>
  </footer>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <div class="toast" id="toast"></div>

</div>

/* =====================================================
   TRANSLATION HELPER
===================================================== */
function t(key, replacements){
  const lang = currentLanguage || 'en';
  let text = TRANSLATIONS[lang]?.[key] || TRANSLATIONS['en'][key] || key;
  if(replacements){
    for(const [k, v] of Object.entries(replacements)){
      text = text.replace(`{${k}}`, v);
    }
  }
  return text;
}

  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatETB(n){
  return Math.round(Number(n)||0).toLocaleString('en-US') + ' ETB';
}
function initials(name){
  const parts = (name||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return '?';
  return parts.slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function getToken(){
  return localStorage.getItem('token');
}
function getHeaders(){
  return {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + getToken()
  };
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}
function showNotification(msg){
  const n = document.getElementById('notification');
  document.getElementById('notification-msg').textContent = msg;
  n.classList.add('show');
  clearTimeout(notificationTimer);
  notificationTimer = setTimeout(()=>n.classList.remove('show'), 4000);
}
function hideNotification(){
  document.getElementById('notification').classList.remove('show');
}
function emptyStateHTML(iconName,title,copy,targetPage,btnLabel){
  return `<div class="empty-state">

}
function handleApiError(res){
  if(res.status === 401){
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    isLogged = false;
    showToast(t('session_expired'));

/* =====================================================
   AUTH — Login / Signup
===================================================== */
async function submitAuth(){
  const nameInput = document.getElementById('a-name');
  const shopInput = document.getElementById('a-shop');
  const phoneInput = document.getElementById('a-phone');
  const passInput = document.getElementById('a-password');

  const name = nameInput?.value?.trim() || '';
  const shop = shopInput?.value?.trim() || '';
  const phone = phoneInput?.value?.trim() || '';
  const password = passInput?.value?.trim() || '';

  if(!name || !shop || !password){
    showToast(t('valid_name_price'));
    return;
  }

  const isSignup = authMode === 'signup';

  try {
    let url, body;

    if(isSignup){
      url = `${API_URL}/auth/signup`;
      body = { name, shop_name: shop, phone, password };
    } else {
      url = `${API_URL}/auth/login`;
      body = { shop_name: shop, password };
    }

    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if(!res.ok){
      showToast(data.error || t('auth_failed'));
      return;
    }

    if(isSignup){
      showToast(t('shop_created'));
      authMode = 'login';
      renderAuthModal();
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    isLogged = true;
    seller = data.user;
    closeModal();
    showPage('store');
    showToast(t('welcome_back'));
    await loadSellerProducts();
    renderStore();

  } catch(err){
    showToast(t('connection_error'));
    console.error('Auth error:', err);
  }
}

async function logout(){
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  isLogged = false;
  seller = null;
  sellerProducts = [];
  renderStore();
  showToast(t('logged_out'));
}

/* =====================================================
   PRODUCTS — Load from backend
===================================================== */
async function loadProducts(){
  try {
    const res = await fetch(`${API_URL}/products`, {
      headers: getHeaders()
    });
    if(res.status === 401){
      localStorage.removeItem('token');
      isLogged = false;
      return [];
    }
    const data = await res.json();
    allProducts = data || [];
    followedStores = allProducts.filter(p => p.is_followed).map(p => p.seller_shop);
    followedStores = [...new Set(followedStores)];
    return allProducts;
  } catch(err){
    console.error('Load products error:', err);
    return [];
  }
}

async function loadSellerProducts(){
  try {
    const res = await fetch(`${API_URL}/seller/products`, {
      headers: getHeaders()
    });
    if(res.status === 401){
      localStorage.removeItem('token');
      isLogged = false;
      return;
    }
    const data = await res.json();
    sellerProducts = data || [];
  } catch(err){
    console.error('Load seller products error:', err);
  }
}

async function loadCart(){
  try {
    const res = await fetch(`${API_URL}/cart`, {
      headers: getHeaders()
    });
    if(res.status === 401){
      localStorage.removeItem('token');
      isLogged = false;
      return;
    }
    const data = await res.json();
    cart = data || [];
    updateCartBadge();
    return cart;
  } catch(err){
    console.error('Load cart error:', err);
  }
}

async function loadBalance(){
  try {
    const res = await fetch(`${API_URL}/balance`, {
      headers: getHeaders()
    });
    if(res.status === 401){
      localStorage.removeItem('token');
      isLogged = false;
      return 0;
    }
    const data = await res.json();
    return data.balance || 0;
  } catch(err){
    return 0;
  }
}

    <div class="card-swatch" style="background:${cat.color}">

      </div>
    </div>
  </div>`;
}

async function renderHome(filter){
  filter = filter || '';
  const q = filter.trim().toLowerCase();

  let list = await loadProducts();

  if(q){
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (CATEGORIES[p.category]?.label?.toLowerCase() || '').includes(q) ||
      (p.seller_shop || '').toLowerCase().includes(q)
    );
  }

  if(filterCategory){
    list = list.filter(p => p.category === filterCategory);
  }
  if(filterMinPrice !== null){
    list = list.filter(p => p.price >= filterMinPrice);
  }
  if(filterMaxPrice !== null){
    list = list.filter(p => p.price <= filterMaxPrice);
  }

  list.sort((a,b) => {
    const aFollowed = followedStores.includes(a.seller_shop);
    const bFollowed = followedStores.includes(b.seller_shop);
    if(aFollowed && !bFollowed) return -1;
    if(!aFollowed && bFollowed) return 1;
    return 0;
  });

  document.getElementById('home-count').textContent = list.length;
  const grid = document.getElementById('home-grid');
  const empty = document.getElementById('home-empty');
  if(list.length === 0){
    grid.style.display = 'none';
    const msg = filterCategory ? t('no_products_filter') : t('no_products_copy');
    empty.innerHTML = emptyStateHTML('search', t('no_products'), msg, null, '');
  } else {
    grid.style.display = 'grid';
    empty.innerHTML = '';
    grid.innerHTML = list.map(productCardHTML).join('');
  }
}

  showPage(previousPage);

}

async function toggleFollow(storeName, sellerId){
  const isFollowing = followedStores.includes(storeName);
  const method = isFollowing ? 'DELETE' : 'POST';

  try {
    const res = await fetch(`${API_URL}/follow/${sellerId}`, {
      method: method,
      headers: getHeaders()
    });
    if(!res.ok){
      showToast(t('error_follow'));
      return;
    }
    if(isFollowing){
      followedStores = followedStores.filter(s => s !== storeName);
      showNotification(`Unfollowed ${storeName}`);
    } else {
      followedStores.push(storeName);
      showNotification(`Following ${storeName}`);
    }
    if(document.getElementById('detail').classList.contains('active')){
      openDetail(selectedProductId);
    }
    renderHome(document.getElementById('search-input').value);
  } catch(err){
    showToast(t('error_connection'));
  }
}

async function addToCart(id){
  try {
    const res = await fetch(`${API_URL}/cart`, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ productId: id, quantity: 1 })
    });
    if(res.status === 401){
      localStorage.removeItem('token');
      isLogged = false;
      showToast(t('please_login_cart'));
      return;
    }
    const data = await res.json();
    if(data.success){
      await loadCart();
      showToast(t('added_to_bag'));
    }
  } catch(err){
    showToast(t('error_adding'));
  }
}

async function changeQty(id, delta){
  const item = cart.find(c => c.product_id === id);
  if(!item) return;
  const newQty = Math.max(1, Math.min(99, item.quantity + delta));
  try {
    await fetch(`${API_URL}/cart/${id}`, {
      method: 'PUT',
      headers: getHeaders(),
      body: JSON.stringify({ quantity: newQty })
    });
    await loadCart();
    renderCart();
  } catch(err){
    showToast(t('error_updating_cart'));
  }
}

async function removeFromCart(id){
  try {
    await fetch(`${API_URL}/cart/${id}`, {
      method: 'DELETE',
      headers: getHeaders()
    });
    await loadCart();
    renderCart();
    showToast(t('removed_from_bag'));
  } catch(err){
    showToast(t('error_removing'));
  }
}

function updateCartBadge(){
  const count = cart.reduce((s,c)=>s+(c.quantity||0),0);
  const badge = document.getElementById('cart-badge');
  if(count>0){ badge.style.display='flex'; badge.textContent = count>99 ? '99+' : count; }
  else { badge.style.display='none'; }
}

function cartItemHTML(c){
  const cat = CATEGORIES[c.category] || CATEGORIES.electronics;
  return `<div class="cart-item">
    <div class="swatch" style="background:${cat.color}">
      ${c.photo ? `<img src="http://localhost:5000${c.photo}" alt="${escapeHtml(c.name)}">` : icon(cat.icon)}
    </div>
    <div class="cart-item-body">
      <div class="cart-item-top">
        <p class="card-name">${escapeHtml(c.name)}</p>
        <button class="icon-btn" onclick="removeFromCart(${c.product_id})" aria-label="Remove">${icon('trash')}</button>
      </div>
      <div class="cart-item-bottom">
        <span class="price-tag">${formatETB(c.price)}</span>
        <div class="qty-stepper">
          <button onclick="changeQty(${c.product_id},-1)" aria-label="Decrease">${icon('minus')}</button>
          <span>${c.quantity}</span>
          <button onclick="changeQty(${c.product_id},1)" aria-label="Increase">${icon('plus')}</button>
        </div>
      </div>
    </div>
  </div>`;
}

async function renderCart(){
  const wrap = document.getElementById('cart-content');
  await loadCart();

  if(cart.length === 0){
    wrap.innerHTML = emptyStateHTML('bag', t('empty_bag'), t('empty_bag_copy'), 'home', t('browse_products'));
    return;
  }
  const total = cart.reduce((s,c)=>s+c.price*(c.quantity||0),0);
  wrap.innerHTML = cart.map(cartItemHTML).join('') + `
    <div class="cart-summary">
      <div class="summary-row"><span>${t('subtotal')}</span><span class="summary-amount">${formatETB(total)}</span></div>
      <button class="btn btn-fill btn-block" onclick="checkout()">${icon('bag')} ${t('checkout')}</button>
    </div>`;
}

async function checkout(){
  if(cart.length === 0) return;
  const total = cart.reduce((s,c)=>s+c.price*(c.quantity||0),0);

  try {
    const res = await fetch(`${API_URL}/orders`, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ items: cart, total })
    });
    if(!res.ok) throw new Error('Checkout failed');
    await loadCart();
    document.getElementById('cart-content').innerHTML = `<div class="empty-state">
      <div class="empty-icon">${icon('check')}</div>
      <p class="empty-title">${t('order_placed')}</p>
      <p class="empty-copy">${t('order_copy').replace('{total}', formatETB(total))}</p>
      <button class="btn btn-fill" onclick="showPage('home')">${t('continue_shopping')}</button>
    </div>`;
    updateCartBadge();
  } catch(err){
    showToast(t('error_checkout'));
  }
}

async function publishListing(){
  const nameInput = document.getElementById('f-name');
  const priceInput = document.getElementById('f-price');
  const name = nameInput.value.trim();
  const price = parseFloat(priceInput.value);
  const qty = parseInt(document.getElementById('f-qty').value) || 0;
  const category = document.getElementById('f-category').value;
  const desc = document.getElementById('f-desc').value.trim();

  nameInput.closest('.field').classList.toggle('field-error', !name);
  priceInput.closest('.field').classList.toggle('field-error', !(price>0));
  if(!name || !(price>0)){
    showToast(t('valid_name_price'));
    return;
  }

  const formData = new FormData();
  formData.append('name', name);
  formData.append('price', price);
  formData.append('category', category);
  formData.append('quantity', qty);
  formData.append('description', desc);
  if(pendingPhotoFile) formData.append('photo', pendingPhotoFile);

  try {
    const res = await fetch(`${API_URL}/products`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: formData
    });
    const data = await res.json();
    if(!res.ok){
      showToast(data.error || t('failed_publish'));
      return;
    }
    pendingPhoto = null;
    pendingPhotoFile = null;
    await loadSellerProducts();
    renderUpload();
    renderStore();
    showToast(t('listing_published'));
  } catch(err){
    showToast(t('error_connection'));
  }
}

/* =====================================================
   SETTINGS — Language selector
===================================================== */
function openSettingsModal(){
  const box = document.getElementById('modal-box');
  const languages = [
    { code: 'en', name: t('english'), native: 'English' },
    { code: 'am', name: t('amharic'), native: 'አማርኛ' },
    { code: 'om', name: t('oromiffa'), native: 'Afaan Oromoo' },
    { code: 'ti', name: t('tigrigna'), native: 'ትግርኛ' }
  ];

  box.innerHTML = `
    <div class="sheet-handle"></div>
    <h2 class="modal-title">${icon('globe')} ${t('language')}</h2>
    <p class="modal-sub">${t('language_sub')}</p>
    ${languages.map(lang => `
      <div class="lang-option ${currentLanguage === lang.code ? 'active' : ''}" onclick="setLanguage('${lang.code}')">
        <div>
          <div class="lang-name">${lang.name}</div>
          <div class="lang-native">${lang.native}</div>

        <span class="lang-check">${icon('check_circle')}</span>
      </div>
    `).join('')}

      <button class="btn btn-fill btn-block" onclick="closeModal()">${t('done')}</button>

function setLanguage(code){
  currentLanguage = code;
  localStorage.setItem('language', code);
  updateUILanguage();
  showToast(t('language_set').replace('{lang}', code.toUpperCase()));
  // Re-render current page with new language
  const activePage = document.querySelector('.page.active')?.id || 'home';
  renderPage(activePage);
  openSettingsModal(); // refresh modal
}

/* =====================================================
   STORE
===================================================== */

  const wrap = document.getElementById('store-content');
  const token = getToken();
  if(!token){
    isLogged = false;
    wrap.innerHTML = `
      <div class="gate-card">
        <div class="gate-icon">${icon('store')}</div>
        <h2 class="gate-title">${t('sell_title')}</h2>
        <p class="gate-copy">${t('sell_copy')}</p>
        <div class="gate-actions">
          <button class="btn btn-outline btn-block" onclick="openAuthModal('login')">${t('login')}</button>
          <button class="btn btn-fill btn-block" onclick="openAuthModal('signup')">${t('create_shop')}</button>
        </div>
      </div>`;
    return;
  }

  isLogged = true;

  try {
    const res = await fetch(`${API_URL}/auth/me`, {
      headers: getHeaders()
    });
    if(res.status === 401){
      localStorage.removeItem('token');
      isLogged = false;
      renderStore();
      return;
    }
    const userData = await res.json();
    seller = userData;
  } catch(err){}

  await loadSellerProducts();
  const balance = await loadBalance();
  const totalSales = sellerProducts.filter(p=>p.sold).reduce((s,p)=>s+p.price,0);

  wrap.innerHTML = `
    <div class="dash-card">
      <div class="dash-actions">
        <button class="settings-btn" onclick="openSettingsModal()" aria-label="${t('settings')}">
          ${icon('settings')} ${t('settings')}
        </button>
        <button class="logout-btn" onclick="logout()" aria-label="${t('logout')}">
          ${icon('logout_icon')} ${t('logout')}
        </button>
      </div>
      <div class="dash-profile">
        <div class="avatar">${seller?.avatar ? `<img src="${seller.avatar}" alt="">` : initials(seller?.name || 'User')}</div>
        <div>
          <p class="dash-name">${escapeHtml(seller?.name || 'User')}</p>
          <p class="dash-shop">${icon('store')} ${escapeHtml(seller?.shop_name || 'My Shop')}</p>
          <p style="font:11px var(--font-body);color:var(--muted);">🆔 ${t('user_id')}: ${seller?.id || 'N/A'}</p>
        </div>
      </div>
      <div class="stat-grid">
        <div class="stat-tile">${icon('package')}<span class="stat-num">${sellerProducts.length}</span><span class="stat-label">${t('products')}</span></div>
        <div class="stat-tile">${icon('banknote')}<span class="stat-num">${formatETB(totalSales)}</span><span class="stat-label">${t('total_sales')}</span></div>
        <div class="stat-tile">${icon('users')}<span class="stat-num">${seller?.followers?.toLocaleString('en-US') || 0}</span><span class="stat-label">${t('followers')}</span></div>
      </div>

      <div class="dash-payment-row">
        <span class="dash-payment-label">${t('account_balance')}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="dash-payment-balance">${formatETB(balance)}</span>
          <button class="dash-payment-plus" onclick="openDepositModal()" aria-label="${t('add_funds')}">
            +
          </button>
        </div>
      </div>
      <div style="margin-top:6px;text-align:right;display:flex;gap:6px;justify-content:flex-end;">
        <button class="btn btn-sm btn-outline" onclick="openDepositModal()" style="font-size:11px;padding:4px 12px;">
          ${icon('banknote')} ${t('add_funds')}
        </button>
        <button class="btn btn-sm btn-fill" onclick="openDepositModal();setTimeout(()=>switchDepositTab('send'),100)" style="font-size:11px;padding:4px 12px;background:var(--saffron);color:var(--ink);">
          ${icon('users')} ${t('send_friend')}
        </button>
      </div>
    </div>

    <div class="section-row">
      <h2 class="section-title">${t('your_listings')}</h2>
      <span class="count-chip">${sellerProducts.length}</span>
    </div>
    <div class="grid">${sellerProducts.map(sellerCardHTML).join('')}</div>
  `;

function sellerCardHTML(p){
  const cat = CATEGORIES[p.category] || CATEGORIES.electronics;
  const statusText = p.sold ? t('unavailable') : (p.quantity>0 ? p.quantity+' '+t('in_stock') : t('out_of_stock'));
  return `<div class="product-card">
    <div class="card-swatch" style="background:${cat.color}">
      ${p.photo ? `<img src="http://localhost:5000${p.photo}" alt="${escapeHtml(p.name)}">` : icon(cat.icon)}
      ${p.sold ? `<div class="sold-overlay"><span>${t('mark_sold')}</span></div>` : ''}
    </div>
    <div class="card-body">
      <p class="card-name">${escapeHtml(p.name)}</p>
      <p class="stock-caption">${statusText}</p>
      <div class="card-footer"><span class="price-tag">${formatETB(p.price)}</span></div>
      <div class="seller-actions">
        <button class="btn btn-outline btn-sm" onclick="openEditModal('${p.id}')">${icon('pencil')} ${t('edit')}</button>
        <button class="btn btn-sm ${p.sold ? 'btn-outline' : 'btn-fill-pine'}" onclick="toggleSold('${p.id}')">${icon('check')} ${p.sold ? t('mark_available') : t('mark_sold')}</button>
      </div>
    </div>
  </div>`;
}

async function toggleSold(id){
  try {
    const res = await fetch(`${API_URL}/products/${id}/toggle-sold`, {
      method: 'PATCH',
      headers: getHeaders()
    });
    if(!res.ok) throw new Error('Failed');
    await loadSellerProducts();
    renderStore();
    showToast(t('status_updated'));
  } catch(err){
    showToast(t('error_updating'));
  }
}

function switchDepositTab(tab){
  const depositTab = document.getElementById('deposit-tab');
  const sendTab = document.getElementById('send-tab');
  const depositForm = document.getElementById('deposit-form');
  const sendForm = document.getElementById('send-form');

  if(tab === 'deposit'){
    depositTab.className = 'btn btn-fill btn-block';
    depositTab.style.cssText = 'flex:1;background:var(--pine);color:#fff;';
    sendTab.className = 'btn btn-outline btn-block';
    sendTab.style.cssText = 'flex:1;';
    depositForm.style.display = 'block';
    sendForm.style.display = 'none';
  } else {
    sendTab.className = 'btn btn-fill btn-block';
    sendTab.style.cssText = 'flex:1;background:var(--pine);color:#fff;';
    depositTab.className = 'btn btn-outline btn-block';
    depositTab.style.cssText = 'flex:1;';
    depositForm.style.display = 'none';
    sendForm.style.display = 'block';
  }
}

async function confirmDeposit(){
  const amountInput = document.getElementById('deposit-amount');
  const methodInput = document.getElementById('deposit-method');
  const refInput = document.getElementById('deposit-ref');

  const amount = parseFloat(amountInput.value);
  const method = methodInput.value;
  const reference = refInput.value.trim();

  if(!amount || amount <= 0){
    showToast(t('valid_amount'));
    return;
  }
  if(!reference){
    showToast(t('valid_reference'));
    return;
  }

  try {
    const res = await fetch(`${API_URL}/balance/deposit`, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ amount, method, reference })
    });

    const data = await res.json();

    if(!res.ok){
      showToast(data.error || t('deposit_failed'));
      return;
    }

    closeModal();
    showToast(t('deposit_success').replace('{amount}', amount).replace('{method}', method));
    renderStore();
  } catch(err){
    showToast(t('error_connection'));
    console.error('Deposit error:', err);
  }
}

async function confirmSend(){
  const userIdInput = document.getElementById('send-user-id');
  const amountInput = document.getElementById('send-amount');
  const passwordInput = document.getElementById('send-password');

  const targetUserId = parseInt(userIdInput.value.trim());
  const amount = parseFloat(amountInput.value);
  const password = passwordInput.value.trim();

  if(!targetUserId || targetUserId <= 0){
    showToast(t('valid_user_id'));
    return;
  }
  if(!amount || amount <= 0){
    showToast(t('valid_amount'));
    return;
  }
  if(!password){
    showToast(t('valid_password'));
    return;
  }

  try {
    const res = await fetch(`${API_URL}/balance/send`, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ targetUserId, amount, password })
    });

    const data = await res.json();

    if(!res.ok){
      showToast(data.error || t('send_failed'));
      return;
    }

    closeModal();
    showToast(t('send_success').replace('{amount}', amount).replace('{id}', targetUserId));
    renderStore();
  } catch(err){
    showToast(t('error_connection'));
    console.error('Send error:', err);
  }
}

      headers: getHeaders()

  let methodsHTML = paymentMethods.length === 0
    ? `<p style="color:var(--muted);font-size:13px;padding:8px 0;">${t('no_payment_methods')}</p>`
    : paymentMethods.map((m) =>
        `<div class="payment-method-item">
          <div><span class="pm-name">${escapeHtml(m.name)}</span> <span class="pm-detail">${escapeHtml(m.detail)}</span></div>
          <button class="pm-remove" onclick="removePaymentMethod(${m.id})">${t('remove')}</button>
        </div>`

  box.innerHTML = `
    <div class="sheet-handle"></div>
    <h2 class="modal-title">${t('add_payment_method')}</h2>
    <p class="modal-sub">${t('add_payment_method')}</p>
    ${methodsHTML}
    <div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px;">
      <div class="field"><label>${t('payment_provider')}</label>
        <select id="pm-select">
          <option value="Telebirr">Telebirr</option>
          <option value="CBE Birr">CBE Birr</option>
          <option value="Chapa">Chapa</option>
          <option value="HelloCash">HelloCash</option>
          <option value="Amole">Amole</option>
          <option value="Bank transfer">Bank transfer</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field"><label>${t('account_number')}</label><input type="text" id="pm-detail" placeholder="e.g. 09XX XXX XXX"></div>
      <button class="btn btn-fill btn-block" onclick="addPaymentMethod()">${icon('plus')} ${t('add_payment_method')}</button>

    <div class="modal-actions" style="margin-top:12px;">
      <button class="btn btn-outline btn-block" onclick="closeModal()">${t('done')}</button>

async function addPaymentMethod(){
  const name = document.getElementById('pm-select').value;
  const detail = document.getElementById('pm-detail').value.trim();
  if(!detail){
    showToast(t('valid_reference'));
    return;
  }
  try {
    await fetch(`${API_URL}/payment-methods`, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ name, detail })
    });
    showToast(`${name} added.`);
    openPaymentModal();
    renderStore();
  } catch(err){
    showToast(t('error_connection'));
  }
}

async function removePaymentMethod(id){
  try {
    await fetch(`${API_URL}/payment-methods/${id}`, {
      method: 'DELETE',
      headers: getHeaders()
    });
    openPaymentModal();
    renderStore();
    showToast(t('removed_from_bag'));
  } catch(err){
    showToast(t('error_connection'));
  }
}

/* ---------- Edit listing modal ---------- */
function openEditModal(id){
  const p = sellerProducts.find(x=>String(x.id)===String(id));
  if(!p) return;
  document.getElementById('modal-box').innerHTML = `
    <div class="sheet-handle"></div>
    <h2 class="modal-title">${t('edit')} ${t('listing')}</h2>
    <p class="modal-sub">${t('edit')} ${t('listing')}</p>
    <div class="field"><label>${t('product_name')}</label><input type="text" id="e-name" value="${escapeHtml(p.name)}"></div>
    <div class="field"><label>${t('category')}</label><select id="e-category">${categoryOptions(p.category)}</select></div>
    <div class="field-row">
      <div class="field"><label>${t('price')}</label><input type="number" id="e-price" min="0" value="${p.price}"></div>
      <div class="field"><label>${t('quantity')}</label><input type="number" id="e-qty" min="0" value="${p.quantity}"></div>
    </div>
    <div class="field"><label>${t('description')}</label><textarea id="e-desc">${escapeHtml(p.description||'')}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-block" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-fill btn-block" onclick="saveEdit('${p.id}')">${t('edit')}</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function saveEdit(id){
  const p = sellerProducts.find(x=>String(x.id)===String(id));
  if(!p) return;
  const nameInput = document.getElementById('e-name');
  const priceInput = document.getElementById('e-price');
  const name = nameInput.value.trim();
  const price = parseFloat(priceInput.value);
  nameInput.closest('.field').classList.toggle('field-error', !name);
  priceInput.closest('.field').classList.toggle('field-error', !(price>=0) || isNaN(price));
  if(!name || isNaN(price) || price<0){
    showToast(t('valid_name_price'));
    return;
  }

  try {
    await fetch(`${API_URL}/products/${id}`, {
      method: 'PUT',
      headers: getHeaders(),
      body: JSON.stringify({
        name,
        category: document.getElementById('e-category').value,
        price,
        quantity: parseInt(document.getElementById('e-qty').value) || 0,
        description: document.getElementById('e-desc').value.trim(),
        sold: p.sold ? 1 : 0
      })
    });
    closeModal();
    await loadSellerProducts();
    renderStore();
    showToast(t('listing_updated'));
  } catch(err){
    showToast(t('error_connection'));
  }
}

/* ---------- Auth modal ---------- */
function openAuthModal(mode){
  authMode = mode;
  authAvatar = null;
  renderAuthModal();
  document.getElementById('modal-overlay').classList.add('open');
}

function renderAuthModal(){
  const isSignup = authMode === 'signup';
  document.getElementById('modal-box').innerHTML = `
    <div class="sheet-handle"></div>
    <h2 class="modal-title">${isSignup ? t('auth_signup_title') : t('auth_login_title')}</h2>
    <p class="modal-sub">${isSignup ? t('auth_signup_sub') : t('auth_login_sub')}</p>
    <div class="field"><label>${t('full_name')}</label><input type="text" id="a-name" placeholder="e.g. Lulit Bekele" required></div>
    <div class="field"><label>${t('shop_name')}</label><input type="text" id="a-shop" placeholder="e.g. Lulit Electronics" required></div>
    ${isSignup ? `<div class="field"><label>${t('phone')}</label><input type="tel" id="a-phone" placeholder="+251 9XX XXX XXX"></div>` : ''}
    <div class="field"><label>${t('password')}</label><input type="password" id="a-password" placeholder="••••••••" required></div>
    <button class="btn btn-fill btn-block" onclick="submitAuth()">${isSignup ? t('create_shop_btn') : t('login_btn')}</button>
    <p class="modal-switch">${isSignup ? t('already_have') : t('new_to_shop')} <a onclick="switchAuthMode()">${isSignup ? t('login') : t('create_one')}</a></p>
  `;
}

function switchAuthMode(){
  authMode = authMode === 'signup' ? 'login' : 'signup';
  renderAuthModal();
}

/* ---------- Modal shared ---------- */
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-box').innerHTML = '';
}
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target.id === 'modal-overlay') closeModal();
});
document.getElementById('search-input').addEventListener('keydown', e=>{
  if(e.key === 'Enter'){ e.preventDefault(); doSearch(); }
});
